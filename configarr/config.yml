# Configarr Configuration - Multi-Instance Radarr Setup
# HD Bluray + WEB Profile (1080p only) with Language-Specific Configurations
# Based on TRaSH-Guides: https://trash-guides.info/Radarr/radarr-setup-quality-profiles/

trashGuideUrl: https://github.com/TRaSH-Guides/Guides
recyclarrConfigUrl: https://github.com/recyclarr/config-templates

radarr:
  # English 1080p Instance
  en-1080p:
    base_url: http://radarr-1080p-en:7878
    api_key: !env RADARR_EN_1080P_API_KEY
    
    quality_definition:
      type: movie
      
    include:
      # Base HD Bluray + WEB templates
      - template: radarr-quality-definition-movie
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web
      
    # Override quality profiles to remove 720p and add English language preferences
    quality_profiles:
      - name: HD Bluray + WEB
        reset_unmatched_scores: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        # Only 1080p qualities - removed all 720p entries
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
        
    # Add language-specific custom formats for English instance
    custom_formats:
      # Language preferences for English + allow Multi/Dual with English
      - trash_ids:
          - 87d0e4c6e31c0f8df4ff8c49d0b2c9f4 # Language: Not English
        quality_profiles:
          - name: HD Bluray + WEB
            score: -10000  # Block non-English releases
            
      - trash_ids:
          - f845be10da4f442654c13e1f2c3d6cd5 # Language: German DL
          - 6aad77771dabe9d3e9d7be86f310b867 # Language: German DL (undefined)
        quality_profiles:
          - name: HD Bluray + WEB
            score: 0       # Allow German dual-language with English
            
      - trash_ids:
          - 9172b2f683f6223e3a1846427b417a3d # Multi
        quality_profiles:
          - name: HD Bluray + WEB
            score: 0       # Allow multi-language releases
            
  # German 1080p Instance  
  de-1080p:
    base_url: http://radarr-1080p-de:7878
    api_key: !env RADARR_DE_1080P_API_KEY
    
    quality_definition:
      type: movie
      
    include:
      # Base HD Bluray + WEB templates
      - template: radarr-quality-definition-movie
      # Use German-specific template
      - template: 2b90e905c99490edc7c7a5787443748b # German HD Bluray + WEB
        source: TRASH
      - template: radarr-custom-formats-hd-bluray-web
      
    # Override quality profiles to remove 720p
    quality_profiles:
      - name: "[German] HD Bluray + WEB"
        reset_unmatched_scores: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 35000
        min_format_score: 0
        quality_sort: top
        # Only 1080p qualities - removed all 720p entries
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
        
    # Language-specific custom formats for German instance  
    custom_formats:
      # Enhance German language preferences
      - trash_ids:
          - 86bc3115eb4e9873ac96904a4a68e19e # Language: German
        quality_profiles:
          - name: "[German] HD Bluray + WEB"
            score: 100     # Prefer German-only releases
            
      - trash_ids:
          - f845be10da4f442654c13e1f2c3d6cd5 # Language: German DL
          - 6aad77771dabe9d3e9d7be86f310b867 # Language: German DL (undefined)
        quality_profiles:
          - name: "[German] HD Bluray + WEB"
            score: 50      # Prefer German dual-language
            
      - trash_ids:
          - 9172b2f683f6223e3a1846427b417a3d # Multi
        quality_profiles:
          - name: "[German] HD Bluray + WEB"
            score: 0       # Allow multi-language releases
            
      - trash_ids:
          - 4eadb75fb23d09dfc0a8e3f687e72287 # Language: Not German or English
        quality_profiles:
          - name: "[German] HD Bluray + WEB"
            score: -10000  # Block other languages

