services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=ACME_EMAIL
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.cloudflare.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
      - --log.level=DEBUG
      - --accesslog
      - --accesslog.filepath=/var/log/traefik/access.log
    ports:
      - "80:80" 
      - "443:443"
      - "127.0.0.1:8080:8080"
    environment:
      - CF_API_EMAIL=henn.linus@gmail.com
      - CF_DNS_API_TOKEN=F4FpBafgtk9ARIVESNnfz52exVSvWzoM15vSqkDI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.ratelimit.ratelimit.burst=200"
      

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ./jellyfin/media:/media
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # — HTTPS router for JELLYFIN_DOMAIN
      - "traefik.http.routers.jellyfin.rule=Host(`JELLYFIN_DOMAIN`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.http.routers.jellyfin.middlewares=ratelimit@docker"
      # — HTTP router that simply redirects to HTTPS
      - "traefik.http.routers.jellyfin-web.rule=Host(`JELLYFIN_DOMAIN`)"
      - "traefik.http.routers.jellyfin-web.entrypoints=web"
      - "traefik.http.routers.jellyfin-web.middlewares=redirect-to-https@docker"

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    depends_on:
      - jellyfin
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ./jellyseerr/config:/app/config
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # — HTTPS router for JELLYSEERR_DOMAIN
      - "traefik.http.routers.jellyseerr.rule=Host(`JELLYSEERR_DOMAIN`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.http.routers.jellyseerr.middlewares=ratelimit@docker"
      # — HTTP → HTTPS redirect
      - "traefik.http.routers.jellyseerr-web.rule=Host(`JELLYSEERR_DOMAIN`)"
      - "traefik.http.routers.jellyseerr-web.entrypoints=web"
      - "traefik.http.routers.jellyseerr-web.middlewares=redirect-to-https@docker"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    depends_on:
      - jellyfin
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./sonarr/config:/config
      - ./jellyfin/media:/media
      - ./downloads:/downloads
    networks:
      - traefik

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    depends_on:
      - jellyfin
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./radarr/config:/config
      - ./jellyfin/media:/media
      - ./downloads:/downloads
    networks:
      - traefik

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      - sonarr
      - radarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr/config:/config
    networks:
      - traefik

  rdtclient:
    image: rogerfar/rdtclient:latest
    container_name: rdtclient
    depends_on:
      - prowlarr
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
      - "6500:6500"
    environment:
      - TZ=${TZ}
      - USER_UID=501
      - USER_GID=20
    volumes:
      - ./rdtclient/db:/data/db
      - ./downloads:/downloads
    networks:
      - traefik

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    networks:
      - traefik

networks:
  traefik:
    driver: bridge
